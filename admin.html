<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion produits - Sophie Glamour Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sophie.css">
</head>
<body>
    <header class="header"><div class="container header-container"><div class="logo"><a href="index.html"><i class="fas fa-leaf"></i> Sophie Glamour Shop</a></div><nav class="navbar"><ul><li><a href="sophie.html">Accueil</a></li><li><a href="products.html">Produits</a></li><li><a href="cart.html">Panier <span id="cart-count" class="cart-badge">0</span></a></li><li><a href="checkout.html">Commande</a></li><li><a href="admin.html">Gestion</a></li></ul></nav><div class="menu-toggle"><i class="fas fa-bars"></i></div></div></header>

    <main class="container">
        <h2 style="margin: 2rem 0 1rem;"> Administration - Gestion des produits</h2>
        <div class="form-card" style="margin-bottom: 2rem;">
            <h3>Ajouter un nouveau produit</h3>
            <div class="form-group"><label>Nom du produit</label><input type="text" id="prodName" placeholder="Ex: Eau de Parfum Magique"></div>
            <div class="form-group"><label>Prix (FCFA)</label><input type="number" id="prodPrice" step="1"></div>
            <div class="form-group"><label>Catégorie</label><select id="prodCat"><option value="parfum">Parfum</option><option value="hygiene">Soins</option><option value="soin">Soin</option></select></div>
            <div class="form-group"><label>URL image (lien)</label><input type="text" id="prodImage" placeholder="https://..."></div>
            <div class="form-group"><label>Description courte</label><textarea id="prodDesc" rows="2"></textarea></div>
            <button id="addProductBtn" class="btn-primary" style="background:#10b981;">Ajouter le produit</button>
        </div>

        <h3> Liste des produits</h3>
        <div id="admin-products-list"></div>
    </main>

    <footer class="footer"><div class="container footer-container"><div class="footer-col"><h4>Sophie Glamour Shop</h4><p>Beauté naturelle</p></div></div></footer>

    <div id="chatbot-widget" class="chatbot-widget"><div class="chatbot-header"><i class="fas fa-robot"></i> Smart Beauty IA<button id="closeChatBtn" class="close-chat"><i class="fas fa-times"></i></button></div><div class="chatbot-messages" id="chatMessages"><div class="bot-msg"> Gérez vos produits facilement.</div></div><div class="chatbot-input"><input type="text" id="chatInput"><button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button></div></div>
    <div id="chatbotToggle" class="chatbot-toggle"><i class="fas fa-comment-dots"></i> Smart Beauty</div>

    <script src="sophie.js"></script>
    <script>
        let editingId = null;
        function renderAdminProducts() {
            let products = getProductsFromStorage();
            const container = document.getElementById('admin-products-list');
            container.innerHTML = products.map(p => `
                <div class="admin-product-item">
                    <div><strong>${p.name}</strong> - ${p.price}FCFA (${p.category})<br><small>${p.desc.substring(0,40)}</small></div>
                    <div>
                        <button class="edit-prod" data-id="${p.id}" style="background:#c4b5fd; border:none; border-radius:20px; padding:6px 12px; margin-right:8px;"><i class="fas fa-edit"></i> Modifier</button>
                        <button class="delete-prod" data-id="${p.id}" style="background:#fecaca; border:none; border-radius:20px; padding:6px 12px;"><i class="fas fa-trash"></i> Supprimer</button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.delete-prod').forEach(btn => {
                btn.addEventListener('click', () => {
                    let id = parseInt(btn.dataset.id);
                    let newProds = getProductsFromStorage().filter(p => p.id !== id);
                    saveProducts(newProds);
                    renderAdminProducts();
                    updateCartBadge(); // just in case
                });
            });
            document.querySelectorAll('.edit-prod').forEach(btn => {
                btn.addEventListener('click', () => {
                    let id = parseInt(btn.dataset.id);
                    let prod = getProductsFromStorage().find(p => p.id === id);
                    if(prod) {
                        document.getElementById('prodName').value = prod.name;
                        document.getElementById('prodPrice').value = prod.price;
                        document.getElementById('prodCat').value = prod.category;
                        document.getElementById('prodImage').value = prod.image;
                        document.getElementById('prodDesc').value = prod.desc;
                        editingId = id;
                        document.getElementById('addProductBtn').innerText = " Mettre à jour le produit";
                    }
                });
            });
        }
        document.getElementById('addProductBtn').addEventListener('click', () => {
            let name = document.getElementById('prodName').value.trim();
            let price = parseFloat(document.getElementById('prodPrice').value);
            let category = document.getElementById('prodCat').value;
            let image = document.getElementById('prodImage').value.trim();
            let desc = document.getElementById('prodDesc').value.trim();
            if(!name || isNaN(price) || !image || !desc) { alert("Tous les champs sont requis (image URL valide)."); return; }
            let products = getProductsFromStorage();
            if(editingId) {
                let index = products.findIndex(p => p.id === editingId);
                if(index !== -1) {
                    products[index] = { ...products[index], name, price, category, image, desc };
                    saveProducts(products);
                    editingId = null;
                    document.getElementById('addProductBtn').innerText = "Ajouter le produit";
                }
            } else {
                let newId = Date.now();
                products.push({ id: newId, name, price, category, image, desc });
                saveProducts(products);
            }
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImage').value = '';
            document.getElementById('prodDesc').value = '';
            renderAdminProducts();
            alert(editingId ? "Produit modifié !" : "Produit ajouté !");
            editingId = null;
        });
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminProducts();
            updateCartBadge();
            initChatbotEvents();
        });
    </script>
</body>
</html>
